aid: american-tower
url: https://raw.githubusercontent.com/api-evangelist/american-tower/refs/heads/main/apis.yml
name: American Tower
description: >-
  American Tower Corporation is one of the largest global REITs and a leading independent
  owner, operator, and developer of multitenant communications real estate. The company
  owns and operates approximately 225,000 communications sites globally, providing tower
  space and related services to wireless carriers and broadcasters across the United States,
  Latin America, Europe, Africa, India, and Asia-Pacific. American Tower enables wireless
  communications networks by leasing antenna space on its towers to mobile network operators.
tags:
  - Telecommunications
  - Wireless Infrastructure
  - Tower Leasing
  - REIT
  - Communications
  - 5G
  - Mobile Networks
type: Index
