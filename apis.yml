access: 3rd-Party
apis: []
common:
  - type: Website
    url: https://www.americantower.com
  - type: Features
    data:
      - name: Tower Colocation and Leasing
        description: >-
          Leasing antenna space on approximately 225,000 communications towers globally
          to wireless carriers, broadcasters, and government users on a colocation basis.
      - name: Global Tower Portfolio
        description: >-
          Multitenant tower infrastructure across the United States, Latin America, Europe,
          Africa, India, and Asia-Pacific regions supporting mobile network expansion.
      - name: 5G Infrastructure Support
        description: >-
          Tower infrastructure supporting 5G network densification and deployment by
          major wireless carriers including AT&T, T-Mobile, Verizon, and international operators.
      - name: Edge Data Centers
        description: >-
          CoreSite data center portfolio providing colocation, interconnection, and edge
          computing infrastructure in major metropolitan markets across the United States.
      - name: Small Cell Solutions
        description: >-
          Small cell and distributed antenna system (DAS) deployments for urban densification
          and in-building wireless coverage enhancement.
      - name: Tower Construction and Development
        description: >-
          New tower construction and build-to-suit services for wireless carriers requiring
          new coverage in underserved areas or markets.
  - type: UseCases
    data:
      - name: Mobile Network Expansion
        description: >-
          Enabling wireless carriers to rapidly expand network coverage and capacity by
          collocating on existing American Tower infrastructure rather than building towers.
      - name: 5G Network Densification
        description: >-
          Supporting 5G rollout by wireless carriers through tower modifications, small cells,
          and new tower builds to increase network density and data throughput.
      - name: International Market Entry
        description: >-
          Providing established tower infrastructure for wireless carriers entering new
          international markets, reducing capital expenditure and time to market.
      - name: Edge Computing Deployment
        description: >-
          Hosting edge computing and data center infrastructure through CoreSite for
          cloud providers, enterprises, and networks requiring low-latency connectivity.
      - name: Government and Broadcast Transmission
        description: >-
          Supporting government communications networks, public safety systems, and
          broadcast transmission infrastructure on American Tower sites.
  - type: Integrations
    data:
      - name: Wireless Carrier Network Systems
        description: >-
          Technical integration with wireless carrier network planning, deployment, and
          operations systems for tower lease management and site access coordination.
      - name: Real Estate Management Platforms
        description: >-
          Integration with REIT management and real estate platforms for lease administration,
          site management, and portfolio reporting.
